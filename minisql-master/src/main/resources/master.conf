# Master Server Configuration

# Server settings
master.port=8000
master.host=0.0.0.0

# Zookeeper settings
zookeeper.connect=localhost:2181
zookeeper.session.timeout=30000
zookeeper.connection.timeout=15000

# Heartbeat settings
heartbeat.interval.ms=3000
heartbeat.timeout.ms=30000

# Region settings
region.split.threshold.mb=256
region.replica.count=3

# Load balancer settings
load.balancer.interval.ms=300000
load.balancer.threshold=1.5

# Thread pool settings
thread.pool.size=10
